name: night-shift (dotnet / cygnet)
# SELF-HOSTED variant — copy into a CygNet C# repo (Anduin, Narya, …).
# Runs on YOUR always-on dev machine, which has the .NET SDK, the CygNet SDK, and
# live CygNet access. GitHub-hosted runners cannot run CygNet-dependent tests;
# this one can — including the live retests that otherwise wait in "Verifying".
#
# ── One-time setup on the dev box ─────────────────────────────────────────────
#   repo → Settings → Actions → Runners → New self-hosted runner
#   install it as a service (always listening), label it e.g. self-hosted,windows,cygnet
#   ensure Git for Windows (git-bash) + gh are present (you already have them)
#   generate a subscription token on the dev box: `claude setup-token`
#   repo → Settings → Secrets and variables → Actions → add CLAUDE_CODE_OAUTH_TOKEN
#   (runs bill to the operator's Claude Max subscription, not pay-per-token API)
#
# ── SECURITY ──────────────────────────────────────────────────────────────────
#   Self-hosted runners must ONLY be used on PRIVATE repos — a fork PR on a public
#   repo could run arbitrary code on your machine. Your repos are private, and the
#   `auto:ready` gate means it only ever acts on issues you explicitly marked.

# MANUAL-ONLY by default: fire it from Actions → night-shift → Run workflow.
# To turn on the nightly schedule, uncomment the `schedule:` block.
on:
  # schedule:
  #   - cron: "0 8 * * *" # ~2–3am America/Chicago (UTC, no DST)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write # claude-code-action exchanges an OIDC token for its GitHub credentials
  actions: read

concurrency:
  group: night-shift
  cancel-in-progress: false

jobs:
  night-shift:
    runs-on: [self-hosted, windows, cygnet] # match your runner's labels
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # No setup-dotnet / no CygNet install — the dev machine already has them.
      - name: Night shift
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are running the Vilya NIGHT SHIFT (autonomous overnight loop) on
            ${{ github.repository }}, on a self-hosted runner that HAS the CygNet
            SDK and live CygNet access. The operator is asleep.

            Read and follow the night-shift skill exactly (it's installed at the
            user level; or read skills/night-shift/SKILL.md if vendored here). Then:
            - Config: docs/project-tracking/GITHUB-PROJECTS.md
            - Review step: apply the crucible-blazor review and loop until Ready.
            - Work ONLY issues labeled `auto:ready`; skip `needs:decision` and epics.
            - Run the FULL test command from config, INCLUDING CygNet integration /
              live tests — you have access here, so do the live retest instead of
              deferring it. Record the live-verified result in the PR and report.
            - Open PRs, NEVER merge. Fork? comment your recommendation, label
              `needs:decision`, move to Blocked, move on.
            - Finish with the morning report.
          claude_args: |
            --max-turns 60
            --allowedTools Edit,Read,Write,Bash
