name: night-shift (dotnet / cygnet)
# SELF-HOSTED variant — copy into a CygNet C# repo (Anduin, Narya, …).
# Runs on YOUR always-on dev machine, which has the .NET SDK, the CygNet SDK, and
# live CygNet access. GitHub-hosted runners cannot run CygNet-dependent tests.
# Process + personal-vs-org runner notes: copy from Vilya's
# docs/project-tracking/GITHUB-PROJECTS.md (Night-shift via GitHub Actions).
#
# ── One-time setup on the dev box ─────────────────────────────────────────────
#   repo → Settings → Actions → Runners → New self-hosted runner
#   install it as a service (always listening), label it e.g. self-hosted,windows,cygnet
#   ensure Git for Windows (git-bash) + gh are present (you already have them)
#   generate a subscription token on the dev box: `claude setup-token`
#   repo → Settings → Secrets and variables → Actions → add CLAUDE_CODE_OAUTH_TOKEN
#   (runs bill to the operator's Claude Max/Pro subscription, not pay-per-token API)
#
# ── SECURITY ──────────────────────────────────────────────────────────────────
#   Self-hosted runners must ONLY be used on PRIVATE repos — a fork PR on a public
#   repo could run arbitrary code on your machine. Your repos are private, and the
#   `auto:ready` gate means it only ever acts on issues you explicitly marked.

# MANUAL-ONLY by default: fire it from Actions → night-shift → Run workflow.
# To turn on the nightly schedule, uncomment the `schedule:` block.
on:
  # schedule:
  #   - cron: "0 8 * * *" # ~2–3am America/Chicago (UTC, no DST)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write # claude-code-action exchanges an OIDC token for its GitHub credentials
  actions: read

concurrency:
  group: night-shift
  cancel-in-progress: false

jobs:
  night-shift:
    runs-on: [self-hosted, windows, cygnet] # match your runner's labels
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # No setup-dotnet / no CygNet install — the dev machine already has them.
      - name: Night shift
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The action's CLI installer does not support Windows; point it at
          # the Claude Code already installed on the dev box instead.
          path_to_claude_code_executable: C:\Users\jerro\.local\bin\claude.exe
          prompt: |
            You are running NIGHT SHIFT on ${{ github.repository }} on a self-hosted
            runner with the CygNet SDK and live CygNet access. The operator is asleep.

            Follow the night-shift skill exactly (user-level install, or
            skills/night-shift/SKILL.md if vendored). It runs the daytime chain:
            /start-feature → implement → /crucible-blazor → remediate → /finish-feature.

            Run the full test command from docs/project-tracking/GITHUB-PROJECTS.md,
            including live CygNet tests when the issue calls for them.
            Open PRs only — never merge. Fork? comment, needs:decision, Blocked, next.
            Finish with the morning report.
          claude_args: |
            --max-turns 60
            --allowedTools Edit,Read,Write,Bash
            --permission-mode bypassPermissions
