name: chain-promote
# Promote night-shift:chain → night-shift:ready when all native blocked-by
# blockers are closed. Copied from Vilya docs/project-tracking/templates/chain-promote.yml
# → .github/workflows/chain-promote.yml in each product repo that runs night-shift chains.
#
# Process canon: Vilya docs/project-tracking/GITHUB-PROJECTS.md (Chain promote).
# Night-shift skill stays eligibility-only; this workflow owns promotion.
#
# ── What it does ──────────────────────────────────────────────────────────────
#   on issues: closed → REST issue-dependencies: issues this closed issue is
#   blocking (dependents). For each open dependent with night-shift:chain ∧
#   plan:ready, ¬needs:decision, ¬type:epic: if every blocked_by blocker is
#   closed → add night-shift:ready and remove night-shift:chain.
#   Expectation: one chain link per merge cycle.
#
# ── Secrets / permissions (product repo) ──────────────────────────────────────
#   Default GITHUB_TOKEN is enough — no CLAUDE_CODE_OAUTH_TOKEN, no PAT.
#   permissions.issues: write → label mutate. No checkout; no contents scope needed.
#   REST issue-dependencies (blocked_by / blocking) are on github.com (and GHE
#   Cloud where that API exists). Not on GHES until GitHub ships the endpoints
#   there. Same-repo edges only in this template. No GraphQL — keeps promotion
#   off the shared user GraphQL bucket (#233 / #240).
#   Org Actions policies that block the Issues API will break this job — check
#   there first. Fine-grained PAT alternative (rare): issues:write on this repo
#   as e.g. CHAIN_PROMOTE_TOKEN, swapped into GH_TOKEN below.
#
# ── Prep on the board ─────────────────────────────────────────────────────────
#   Set native blocked-by (UI or API), label successors night-shift:chain, ensure
#   plan:ready before you expect promotion. No body-text Blocked-by: convention.

on:
  issues:
    types: [closed]

permissions:
  issues: write

concurrency:
  group: chain-promote-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    # Skip PR timeline noise if a pull_request ever arrives as issues.closed shape.
    if: github.event.issue.pull_request == null
    steps:
      - name: Promote eligible night-shift:chain dependents
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          CLOSED_NUMBER: ${{ github.event.issue.number }}
        shell: bash
        run: |
          set -euo pipefail

          api() {
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              --paginate \
              "$@"
          }

          # Label/state gate only. "check-blockers" → fetch REST blocked_by next.
          # REST Issue.state is lowercase open|closed; labels are [{name}, ...].
          label_jq='
            . as $n
            | ($n.labels // [] | map(.name)) as $labs
            | if (($n.state // "") | ascii_downcase) != "open" then "not open"
              elif ($labs | index("night-shift:chain") | not) then "missing night-shift:chain"
              elif ($labs | index("plan:ready") | not) then "missing plan:ready"
              elif ($labs | index("needs:decision")) then "needs:decision"
              elif ($labs | index("type:epic")) then "type:epic"
              elif ($labs | index("night-shift:ready")) then "already night-shift:ready"
              else "check-blockers"
              end
          '

          # Dependents = issues this closed issue is blocking (they list us in blocked_by).
          dependents=$(api \
            "/repos/${OWNER}/${REPO}/issues/${CLOSED_NUMBER}/dependencies/blocking")
          count=$(echo "$dependents" | jq 'length')
          if [[ "$count" -eq 0 ]]; then
            echo "No dependents (blocking) for #$CLOSED_NUMBER — nothing to promote."
            echo "Done. promoted=0 skipped=0 (closed #$CLOSED_NUMBER)"
            exit 0
          fi

          promoted=0
          skipped=0

          while IFS= read -r node; do
            [[ -z "$node" ]] && continue
            num=$(echo "$node" | jq -r '.number')
            verdict=$(echo "$node" | jq -r "$label_jq")
            if [[ "$verdict" != "check-blockers" ]]; then
              echo "skip #$num — $verdict"
              skipped=$((skipped + 1))
              continue
            fi
            open_blockers=$(api \
              "/repos/${OWNER}/${REPO}/issues/${num}/dependencies/blocked_by" \
              | jq '[.[] | select((.state // "") | ascii_downcase != "closed")] | length')
            if [[ "$open_blockers" -gt 0 ]]; then
              echo "skip #$num — $open_blockers open blocker(s) remain"
              skipped=$((skipped + 1))
              continue
            fi
            echo "promote #$num — night-shift:chain → night-shift:ready"
            gh issue edit "$num" --repo "$OWNER/$REPO" \
              --add-label "night-shift:ready" \
              --remove-label "night-shift:chain"
            promoted=$((promoted + 1))
          done < <(echo "$dependents" | jq -c '.[]')

          echo "Done. promoted=$promoted skipped=$skipped (closed #$CLOSED_NUMBER)"
