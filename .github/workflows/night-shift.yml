name: night-shift
# Live instance for jerrodtuck/vilya. Generate for other repos at
# https://vilya.jerrodtuck.com/night-shift#generate-workflow
# Portable template: docs/project-tracking/templates/night-shift.yml
# Stack / Crucible / Test command: docs/project-tracking/GITHUB-PROJECTS.md

on:
  # schedule:
  #    - cron: "0 8 * * *" # ~2–3am America/Chicago (UTC, no DST adjustment)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

concurrency:
  group: night-shift
  cancel-in-progress: false

jobs:
  night-shift:
    runs-on: [self-hosted, windows]
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prefer Git Bash over WSL stub
        shell: powershell
        run: |
          "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Program Files\Git\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Night shift
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
          CLAUDE_CODE_GIT_BASH_PATH: C:\Program Files\Git\bin\bash.exe
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          path_to_claude_code_executable: C:\Users\jerro\.local\bin\claude.exe
          # Private repos only. Turn off after the next green bring-up run.
          show_full_output: true
          prompt: |
            You are running NIGHT SHIFT on ${{ github.repository }}. The operator is asleep.

            Follow the night-shift skill exactly (user-level install, or
            skills/night-shift/SKILL.md if vendored).

            Read this repo's docs/project-tracking/GITHUB-PROJECTS.md for
            Stack, Crucible variant, and Test command. Run the daytime chain:
            /start-feature → implement → /<Crucible variant from that file> →
            remediate → /finish-feature (use that Test command).

            Open PRs only — never merge, never push to the default branch.
            At a real design fork: comment recommendation, label needs:decision,
            Blocked, next issue. Finish with the morning report per the skill.
          claude_args: |
            --max-turns 500
            --allowedTools Edit,Read,Write,Bash
            --permission-mode bypassPermissions
