name: night-shift
# SELF-HOSTED overnight runner for vilya (Next.js stack).
# Runs on the operator's always-on dev machine (node, git, gh already present).
# The sibling template for CygNet C# repos lives at
# docs/project-tracking/templates/night-shift-dotnet-cygnet.yml.
# Process + personal-vs-org runner notes: docs/project-tracking/GITHUB-PROJECTS.md
#
# ── One-time setup on the dev box ─────────────────────────────────────────────
#   repo → Settings → Actions → Runners → New self-hosted runner
#   install it as a service (always listening); label it: self-hosted, windows
#   ensure node 20+, Git for Windows, and gh are on the service account's PATH
#   generate a subscription token on the dev box: `claude setup-token`
#   repo → Settings → Secrets and variables → Actions → add CLAUDE_CODE_OAUTH_TOKEN
#   (runs bill to the operator's Claude Max/Pro subscription, not pay-per-token API)
#
# ── SECURITY ──────────────────────────────────────────────────────────────────
#   Self-hosted runners must ONLY be used on PRIVATE repos — a fork PR on a
#   public repo could run arbitrary code on your machine. This repo is private,
#   and the night-shift skill's `auto:ready` gate means the loop only ever acts
#   on issues the operator explicitly marked safe for unattended work.

# MANUAL-ONLY by default: fire it from Actions → night-shift → Run workflow.
# Re-enable `schedule:` only after a manual run is proven green — see the
# night-shift section of docs/project-tracking/GITHUB-PROJECTS.md.
on:
  # schedule:
  #    - cron: "0 8 * * *" # ~2–3am America/Chicago (UTC, no DST adjustment)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write # claude-code-action exchanges an OIDC token for its GitHub credentials
  actions: read

concurrency:
  group: night-shift
  cancel-in-progress: false

jobs:
  night-shift:
    runs-on: [self-hosted, windows] # match your runner's labels
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — the registry and diff view are git-native

      - name: Night shift
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The action's CLI installer does not support Windows; point it at
          # the Claude Code already installed on this dev box instead.
          path_to_claude_code_executable: C:\Users\jerro\.local\bin\claude.exe
          prompt: |
            You are running NIGHT SHIFT on ${{ github.repository }}. The operator is asleep.

            Follow skills/night-shift/SKILL.md EXACTLY. It runs the daytime chain for each
            eligible auto:ready issue: /start-feature → implement → /crucible-<stack> from
            docs/project-tracking/GITHUB-PROJECTS.md → remediate → /finish-feature.

            Open PRs only — never merge, never push to the default branch. At a real design
            fork: comment recommendation, label needs:decision, Blocked, next issue.
            Finish with the morning report per the skill.
          claude_args: |
            --max-turns 60
            --allowedTools Edit,Read,Write,Bash
            --permission-mode bypassPermissions
