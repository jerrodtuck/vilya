name: night-shift
# SELF-HOSTED overnight runner for vilya (Next.js stack).
# Runs on the operator's always-on dev machine (node, git, gh already present).
# The sibling template for CygNet C# repos lives at
# docs/project-tracking/templates/night-shift-dotnet-cygnet.yml.
#
# ── One-time setup on the dev box ─────────────────────────────────────────────
#   repo → Settings → Actions → Runners → New self-hosted runner
#   install it as a service (always listening); label it: self-hosted, windows
#   ensure node 20+, Git for Windows, and gh are on the service account's PATH
#   repo → Settings → Secrets and variables → Actions → add ANTHROPIC_API_KEY
#
# ── SECURITY ──────────────────────────────────────────────────────────────────
#   Self-hosted runners must ONLY be used on PRIVATE repos — a fork PR on a
#   public repo could run arbitrary code on your machine. This repo is private,
#   and the night-shift skill's `auto:ready` gate means the loop only ever acts
#   on issues the operator explicitly marked safe for unattended work.

on:
  schedule:
    - cron: "0 8 * * *" # ~2–3am America/Chicago (UTC, no DST adjustment)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: night-shift
  cancel-in-progress: false

jobs:
  night-shift:
    runs-on: [self-hosted, windows] # match your runner's labels
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — the registry and diff view are git-native

      - name: Night shift
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are running the Vilya NIGHT SHIFT (autonomous overnight loop) on
            ${{ github.repository }}. The operator is asleep.

            Read and follow skills/night-shift/SKILL.md in this repo EXACTLY —
            preflight, eligibility, the loop, the hard stop at decision forks,
            never merge, morning report. Then:
            - Config: docs/project-tracking/GITHUB-PROJECTS.md (owner, project #,
              ids, labels, stack, crucible variant, test command).
            - Review step: apply skills/crucible-nextjs/SKILL.md and loop until
              the signal reads Ready (cap 3 refactor rounds).
            - Work ONLY issues labeled `auto:ready`; skip `needs:decision` and
              epics. Up to 3 issues; prefer one finished cleanly.
            - Test command runs in apps/skill-registry: npm test && npm run build.
              Green is required to open a PR as ready.
            - Open PRs, NEVER merge, never push to main. At a real design fork:
              comment your recommendation, label `needs:decision`, move the
              issue to Blocked, move on.
            - Finish with the morning report per the skill.
          claude_args: |
            --max-turns 60
            --allowedTools Edit,Read,Write,Bash
